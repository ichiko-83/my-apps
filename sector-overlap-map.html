<title>セクター相関マップ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap');

  :root{
    --bg:#080B10;
    --panel:#0F141B;
    --panel-2:#141A23;
    --line:#1E2530;
    --text:#E7EAEE;
    --text-dim:#7C8797;
    --text-faint:#454E5C;

    --c-compute:#4FD6C4;
    --c-infra:#F4B740;
    --c-energy:#9FE85A;
    --c-defense:#F76E7E;
    --c-emerging:#B98CF5;

    --gold:#F0C34D;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Zen Kaku Gothic New',sans-serif;}

  .mono{font-family:'JetBrains Mono',monospace;}

  .wrap{max-width:920px; margin:0 auto; padding:22px 14px 120px;}

  header{padding:6px 4px 20px; border-bottom:1px solid var(--line); margin-bottom:20px;}
  .eyebrow{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.18em; color:var(--gold); text-transform:uppercase; margin-bottom:8px;}
  h1{font-size:22px; font-weight:900; margin:0 0 8px; letter-spacing:.01em;}
  .sub{font-size:13px; color:var(--text-dim); line-height:1.7; margin:0;}

  .legend{display:flex; flex-wrap:wrap; gap:8px 14px; margin:18px 0 4px; font-family:'JetBrains Mono',monospace; font-size:10.5px;}
  .legend span{display:inline-flex; align-items:center; gap:6px; color:var(--text-dim);}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}

  .hint{font-size:11.5px; color:var(--text-faint); font-family:'JetBrains Mono',monospace; margin:14px 2px 4px; display:flex; align-items:center; gap:6px;}

  .meta-block{margin-top:26px;}
  .meta-title{font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; padding-bottom:8px; margin-bottom:14px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:8px;}

  .sector-row{display:grid; grid-template-columns:1fr; gap:10px; margin-bottom:14px;}
  @media(min-width:640px){ .sector-row{grid-template-columns:1fr 1fr;} }

  .sector-card{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px 12px 10px;}
  .sector-name{font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:var(--text-dim); margin-bottom:9px; text-transform:uppercase;}
  .pills{display:flex; flex-wrap:wrap; gap:7px;}

  .pill{
    position:relative;
    font-family:'JetBrains Mono',monospace; font-weight:600; font-size:12.5px;
    background:var(--panel-2); border:1px solid var(--line); color:var(--text);
    padding:6px 9px; border-radius:7px; cursor:pointer; user-select:none;
    transition:opacity .25s ease, border-color .2s ease, transform .15s ease, box-shadow .2s ease;
  }
  .pill:active{transform:scale(0.96);}
  .pill .deg{
    font-size:8.5px; color:var(--text-faint); margin-left:5px; font-weight:500;
  }
  .pill.dimmed{opacity:.22;}
  .pill.selected{
    border-color:var(--gold); box-shadow:0 0 0 1px var(--gold), 0 0 14px rgba(240,195,77,.35);
    background:#1C1A10;
  }
  .pill.connected{
    border-color:var(--gold); box-shadow:0 0 0 1px rgba(240,195,77,.5), 0 0 10px rgba(240,195,77,.18);
  }
  .pill.connected .deg{color:var(--gold);}

  #panel{
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:var(--panel); border-top:1px solid var(--gold);
    max-height:46vh; overflow-y:auto;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 -12px 30px rgba(0,0,0,.5);
  }
  #panel.open{transform:translateY(0%);}
  .panel-inner{max-width:920px; margin:0 auto; padding:14px 16px 22px;}
  .panel-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .panel-title{font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .panel-title .badge{font-size:10px; color:var(--bg); background:var(--gold); padding:2px 7px; border-radius:20px; font-weight:700;}
  .close-btn{background:none; border:1px solid var(--line); color:var(--text-dim); width:28px; height:28px; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;}

  .conn-row{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .conn-row:last-child{border-bottom:none;}
  .conn-tick{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--gold); min-width:56px; flex-shrink:0;}
  .conn-reason{font-size:12.5px; color:var(--text-dim); line-height:1.5; padding-top:1px;}

  #scrim{position:fixed; inset:0; background:rgba(0,0,0,.4); opacity:0; pointer-events:none; transition:opacity .28s ease; z-index:19;}
  #scrim.open{opacity:1; pointer-events:auto;}

  footer{margin-top:30px; padding-top:14px; border-top:1px solid var(--line); font-size:11px; color:var(--text-faint); line-height:1.7; font-family:'JetBrains Mono',monospace;}
</style>
</head>

// build adjacency
const adj = {};
EDGES.forEach(([a,b,reason])=>{
  (adj[a] = adj[a]||[]).push({t:b, reason});
  (adj[b] = adj[b]||[]).push({t:a, reason});
});

const legendEl = document.getElementById('legend');
Object.values(META).forEach(m=>{
  const s = document.createElement('span');
  s.innerHTML = `<span class="dot" style="background:${m.color}"></span>${m.label}`;
  legendEl.appendChild(s);
});

const board = document.getElementById('board');
Object.entries(META).forEach(([metaKey, metaInfo])=>{
  const block = document.createElement('div');
  block.className = 'meta-block';
  block.innerHTML = `<div class="meta-title" style="color:${metaInfo.color}">
      <span class="dot" style="background:${metaInfo.color}"></span>${metaInfo.label}
    </div>`;
  const row = document.createElement('div');
  row.className = 'sector-row';

  SECTORS.filter(s=>s.meta===metaKey).forEach(sector=>{
    const card = document.createElement('div');
    card.className = 'sector-card';
    card.innerHTML = `<div class="sector-name">${sector.key}</div>`;
    const pills = document.createElement('div');
    pills.className = 'pills';
    sector.tickers.forEach(t=>{
      const deg = (adj[t]||[]).length;
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.dataset.ticker = t;
      pill.innerHTML = `${t}${deg? `<span class="deg">${deg}</span>`:''}`;
      pill.addEventListener('click', ()=>selectTicker(t));
      pills.appendChild(pill);
    });
    card.appendChild(pills);
    row.appendChild(card);
  });

  block.appendChild(row);
  board.appendChild(block);
});

const allPills = ()=>document.querySelectorAll('.pill');
const panel = document.getElementById('panel');
const scrim = document.getElementById('scrim');
const panelTicker = document.getElementById('panelTicker');
const panelCount = document.getElementById('panelCount');
const panelList = document.getElementById('panelList');

let currentSelected = null;

function selectTicker(t){
  if(currentSelected === t){ closePanel(); return; }
  currentSelected = t;
  const connections = adj[t] || [];
  const connectedSet = new Set(connections.map(c=>c.t));

  allPills().forEach(p=>{
    p.classList.remove('selected','connected','dimmed');
    const pt = p.dataset.ticker;
    if(pt === t) p.classList.add('selected');
    else if(connectedSet.has(pt)) p.classList.add('connected');
    else p.classList.add('dimmed');
  });

  panelTicker.textContent = t;
  panelCount.textContent = connections.length ? `${connections.length} 件の関連` : '関連銘柄なし';
  panelList.innerHTML = '';
  if(connections.length === 0){
    panelList.innerHTML = `<div class="conn-reason" style="padding:10px 0;">今回のマップ上では直接の重複テーマは登録されていません。</div>`;
  } else {
    connections.forEach(c=>{
      const row = document.createElement('div');
      row.className = 'conn-row';
      row.innerHTML = `<div class="conn-tick">${c.t}</div><div class="conn-reason">${c.reason}</div>`;
      panelList.appendChild(row);
    });
  }

  panel.classList.add('open');
  scrim.classList.add('open');
}

function closePanel(){
  currentSelected = null;
  allPills().forEach(p=>p.classList.remove('selected','connected','dimmed'));
  panel.classList.remove('open');
  scrim.classList.remove('open');
}

document.getElementById('closeBtn').addEventListener('click', closePanel);
scrim.addEventListener('click', closePanel);
</script>
